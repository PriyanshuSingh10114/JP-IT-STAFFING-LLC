# Docker Compose for development with volumes
version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin_password_change_me
    ports:
      - "27017:27017"
    volumes:
      - mongodb_dev_data:/data/db

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:admin_password_change_me@mongodb:27017/job_automation_db?authSource=admin
    volumes:
      - ./backend/src:/app/src
      - /app/node_modules
    depends_on:
      - mongodb

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    depends_on:
      - backend

volumes:
  mongodb_dev_data:
